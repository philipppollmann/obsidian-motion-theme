name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update manifest version
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json

      - name: Create release archive
        run: |
          zip -j notion-motion-${{ github.ref_name }}.zip theme.css manifest.json

      - name: Generate changelog from commits
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -n 1)
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s" --no-merges)
          else
            CHANGES=$(git log "$PREV_TAG".."${{ github.ref_name }}" --pretty=format:"- %s" --no-merges)
          fi
          echo "CHANGES<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Notion Motion ${{ github.ref_name }}"
          body: |
            ## Notion Motion ${{ github.ref_name }}

            A pixel-accurate Notion theme for Obsidian with full Light & Dark mode support.

            ### Installation
            1. Download `notion-motion-${{ github.ref_name }}.zip`
            2. Extract `theme.css` and `manifest.json` into your vault's `.obsidian/themes/Notion Motion/` folder
            3. Open Obsidian → Settings → Appearance → Themes → select **Notion Motion**

            ### Changes
            ${{ steps.changelog.outputs.CHANGES }}
          files: |
            notion-motion-${{ github.ref_name }}.zip
            theme.css
            manifest.json
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
